name: Generate EPG

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate country EPG files
        run: |
          python -c "
          import logging, sys, os
          logging.basicConfig(level=logging.INFO, format='%(asctime)s [%(levelname)s] %(message)s')
          sys.path.append(os.getcwd())
          from src.epg_merger import generate_country_files
          sys.exit(0 if generate_country_files('.') else 1)
          "

      - name: Commit and Push EPG files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          git add epg_*.xml
          
          if git diff --cached --quiet; then
            echo "No EPG changes to commit"
            exit 0
          fi
          
          git commit -m "Auto-update EPG files [skip ci]"
          git push
